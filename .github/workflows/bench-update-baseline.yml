name: Bench — Update Baseline

# Manually-triggered workflow to capture a fresh benchmark baseline on the
# pinned CI runner. Produces the updated baseline JSON as a workflow artifact
# for a maintainer to download and commit via PR.
#
# Why artifact instead of auto-PR: GitHub's anti-loop policy prevents PRs
# opened by the default GITHUB_TOKEN from triggering subsequent workflow
# runs. Uploading an artifact sidesteps this entirely. Upgrade to auto-PR
# later if the refresh cadence justifies it — see the upgrade path note
# in docs/plans/2026-04-16-001-feat-performance-benchmarks-plan.md (Unit 5).

on:
    workflow_dispatch:
        inputs:
            package:
                description: >-
                    Package whose baseline to refresh. `all` iterates every
                    registered package. Keep this list in sync with
                    PACKAGE_REGISTRY in benchmarks/compare.mjs.
                required: false
                default: all
                type: choice
                options:
                    - all
                    - data-core
                    - app-core

jobs:
    update-baseline:
        runs-on: ubuntu-22.04
        timeout-minutes: 15
        permissions:
            contents: read
            # Add contents: write + pull-requests: write when the auto-PR
            # upgrade lands. Currently only artifact upload is used.
        steps:
            - name: Check out code
              uses: actions/checkout@v4
            - name: Use CI .env file
              run: cp .env.ci .env
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Cache turbo build setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install Packages
              run: npm ci
            - name: Build packages
              run: npm run build
            - name: Run benchmarks
              run: npm run bench
            - name: Refresh baselines
              shell: bash
              env:
                  SELECTED_PACKAGE: ${{ inputs.package }}
              run: |
                  set -e
                  # Expand `all` to every registered package. Keep this
                  # list in sync with PACKAGE_REGISTRY in
                  # benchmarks/compare.mjs and the `package` input options.
                  if [ "$SELECTED_PACKAGE" = "all" ] || [ -z "$SELECTED_PACKAGE" ]; then
                    PACKAGES=(data-core app-core)
                  else
                    PACKAGES=("$SELECTED_PACKAGE")
                  fi
                  for pkg in "${PACKAGES[@]}"; do
                    echo "::group::Refresh baseline for $pkg"
                    RESULTS="packages/$pkg/benchmarks/results/$pkg.json"
                    if [ ! -s "$RESULTS" ]; then
                      echo "::error::Bench results file missing or empty at $RESULTS. Check that vitest bench matched at least one .bench.ts file for $pkg."
                      exit 1
                    fi
                    node benchmarks/compare.mjs --package "$pkg" --update
                    echo "::endgroup::"
                  done
            - name: Upload refreshed baselines
              uses: actions/upload-artifact@v4
              with:
                  name: refreshed-baseline-${{ github.sha }}
                  path: benchmarks/baselines/*.json
                  retention-days: 30
                  if-no-files-found: error
            - name: Summary
              shell: bash
              env:
                  SELECTED_PACKAGE: ${{ inputs.package }}
              run: |
                  echo "### Baseline refreshed" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Packages refreshed: \`${SELECTED_PACKAGE:-all}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Download the \`refreshed-baseline-${{ github.sha }}\` artifact from this run and commit the updated file(s) under \`benchmarks/baselines/\` via a PR." >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "Commit SHA: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "Runner image: \`$ImageOS-$ImageVersion\`" >> "$GITHUB_STEP_SUMMARY"
