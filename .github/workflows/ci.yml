name: CI

on:
    push:
        branches:
            - '**'
        tags:
            - 'alpha'
            - 'alpha-*'
    pull_request:

jobs:
    ci:
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        runs-on: ubuntu-latest
        steps:
            - name: Check out code
              uses: actions/checkout@v4
            - name: Use CI .env file
              run: cp .env.ci .env
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Cache turbo build setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install Packages
              run: npm ci
            - name: Build packages
              run: npm run build
            - name: Check Package Versions are in Sync
              run: npm run validate-packages-sync
            - name: Validate Current Configuration (deneb-config.json)
              run: npm run validate-config-for-commit
            - name: Linting Checks
              run: npm run eslint
            - name: Prettier Checks
              run: npm run prettier-check
            - name: Tests
              run: npm run test
            - name: Tests (benchmarks compare script)
              run: npm run test:benchmarks
            - name: Confirm pbiviz package (AppSource Version)
              run: npm run package

    bench:
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        needs: ci
        runs-on: ubuntu-22.04
        timeout-minutes: 10
        steps:
            - name: Check out code
              uses: actions/checkout@v4
            - name: Use CI .env file
              run: cp .env.ci .env
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Cache turbo build setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install Packages
              run: npm ci
            - name: Build packages
              run: npm run build
            - name: Run benchmarks and compare
              id: bench
              shell: bash
              continue-on-error: true
              run: |
                  set +e
                  npm run bench
                  # A bench crash leaves no results file → compare.mjs
                  # hits ENOENT and exits 2 (script error), which the
                  # "Fail on script error" step catches. No need to check
                  # bench's own exit code separately.
                  npm run bench:compare
                  DATA_CORE_EXIT=$?
                  echo "data_core_compare_exit=$DATA_CORE_EXIT" >> "$GITHUB_OUTPUT"
                  # app-core runs with its own baseline. Advisory until a
                  # real baseline lands (current baseline is a bootstrap
                  # placeholder — compare.mjs returns 3 until replaced).
                  node benchmarks/compare.mjs --package app-core --format json
                  APP_CORE_EXIT=$?
                  echo "app_core_compare_exit=$APP_CORE_EXIT" >> "$GITHUB_OUTPUT"
                  # Aggregate worst exit code for the downstream guards.
                  # Priority: 2 (error) > 1 (regression) > everything else.
                  COMPARE_EXIT=0
                  for code in "$DATA_CORE_EXIT" "$APP_CORE_EXIT"; do
                    if [ "$code" = "2" ]; then COMPARE_EXIT=2; break; fi
                    if [ "$code" = "1" ] && [ "$COMPARE_EXIT" != "2" ]; then COMPARE_EXIT=1; fi
                  done
                  echo "compare_exit=$COMPARE_EXIT" >> "$GITHUB_OUTPUT"
                  exit 0
            - name: Upload bench results artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: bench-results-${{ github.sha }}
                  path: |
                      packages/data-core/benchmarks/results/data-core.json
                      packages/app-core/benchmarks/results/app-core.json
                  retention-days: 14
                  if-no-files-found: warn
            - name: Fail on script error
              if: steps.bench.outputs.compare_exit == '2'
              run: |
                  echo "::error::Benchmark comparison script failed (compare_exit=${{ steps.bench.outputs.compare_exit }}, data-core=${{ steps.bench.outputs.data_core_compare_exit }}, app-core=${{ steps.bench.outputs.app_core_compare_exit }}). A bench crash produces ENOENT in compare.mjs which exits 2. See 'Run benchmarks and compare' step for details."
                  exit 1
            - name: Flag regression (advisory)
              if: steps.bench.outputs.compare_exit == '1'
              continue-on-error: true
              run: |
                  echo "::warning::Benchmark regression detected — see comparison table in the 'Run benchmarks and compare' step (data-core=${{ steps.bench.outputs.data_core_compare_exit }}, app-core=${{ steps.bench.outputs.app_core_compare_exit }}). During advisory rollout, regressions are reported but do NOT block merges."
                  exit 1

    alpha-release:
        if: startsWith(github.ref, 'refs/tags/alpha')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Check out code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - name: Use CI .env file
              run: cp .env.ci .env
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'
            - name: Cache turbo build setup
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-
            - name: Install Packages
              run: npm ci
            - name: Build packages
              run: npm run build
            # Guard the published artifact against a tampered `.env.ci`.
            # `package-alpha` deliberately skips the validator locally so
            # that maintainers can produce one-off debug builds (e.g.
            # with ALLOW_EXTERNAL_URI=true) for issue triage. CI does
            # not need that flexibility — anything published to a
            # GitHub release under an `alpha` tag must satisfy the same
            # configuration invariants as the certified `package`
            # script. Running the validator here asserts that the
            # on-disk `.env` (copied from `.env.ci` above) holds the
            # approved safe values before `package-alpha` bakes them
            # into the artifact.
            #
            # See https://github.com/deneb-viz/deneb/issues/651.
            - name: Validate CI configuration before alpha packaging
              run: npm run validate-config-for-commit
            - name: Build Alpha Package
              run: npm run package-alpha
            - name: Delete existing alpha release
              run: gh release delete ${{ github.ref_name }} --yes || true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            - name: Fetch all tags
              run: git fetch --tags --force
            - name: Get last versioned tag
              id: last_tag
              run: |
                  LAST_TAG=$(git tag -l '[0-9]*' --sort=-v:refname | head -n 1)
                  echo "tag=$LAST_TAG" >> $GITHUB_OUTPUT
                  echo "Last versioned tag: $LAST_TAG"
            - name: Generate changelog
              id: changelog
              uses: requarks/changelog-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fromTag: ${{ github.ref_name }}
                  toTag: ${{ steps.last_tag.outputs.tag }}
                  excludeTypes: ''
                  writeToFile: false
            - name: Create Alpha Channel Pre-Release
              uses: softprops/action-gh-release@v2
              with:
                  prerelease: true
                  name: 'Alpha Channel: ${{ github.ref_name }}'
                  body: |
                      Deneb Alpha Channel build, which is the latest release candidate for early adopters.

                      Please refer to the [Early Access Builds](https://deneb-viz.github.io/community/early-access) page on the Deneb website for information on usage and installation.

                      The list of changes should be present in the [Change Log in the 'canary' version](https://deneb-viz.github.io/docs/next/changelog) of the documentation on the Deneb website.

                      The .pbiviz file below needs to be manually installed and is not tied to the AppSource version. **It is not supported for production use and is intended for the purposes of testing and feedback only**.

                      For any issues you create, please ensure to specify the exact version number you are using. Again, please refer to the [Early Access Builds](https://deneb-viz.github.io/community/early-access#providing-feedback-on-early-access-builds) page for information on how to do this.

                      ---

                      ## Changes since ${{ steps.last_tag.outputs.tag }}

                      ${{ steps.changelog.outputs.changes }}
                  files: |
                      dist/ALPHA*.pbiviz
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
